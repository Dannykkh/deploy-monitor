<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Monitor - 로그인</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h1>Deploy Monitor</h1>
            <p>배포 관리 대시보드</p>
        </div>
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username">사용자명</label>
                <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호" autocomplete="current-password" required>
            </div>
            <div id="loginError" class="error-message" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">로그인</button>
        </form>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
